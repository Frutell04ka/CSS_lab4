<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Fast Food Delivery</title>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="global.css" />
	</head>
	<body>
		<section id="section-header">
			<header class="site-header container">
				<div class="logo">
					<img src="images/logo.png" alt="Foo Logo Icon" class="logo-icon" />
					<span class="logo-text">Foo</span>
				</div>
				<nav class="main-nav">
					<a href="#home" class="active">Home</a>
					<a href="#menu">Menu</a>
					<a href="#contact">Contact</a>
					<a href="#shop">Shop</a>
				</nav>
				<div class="header-actions">
					<div class="search-box">
						<img src="images/6_47.svg" alt="Search" class="search-icon" />
						<input type="text" placeholder="Search" class="search-input" />
					</div>
					<div class="divider"></div>
					<div class="cart-wrapper">
						<img src="images/7_71.svg" alt="Cart" class="cart-icon" />
					</div>
				</div>
			</header>
		</section>
		<section id="section-hero">
			<div class="hero-container container">
				<div class="hero-content">
					<h1 class="hero-title">
						<span class="text-primary">Fast</span> Food<br />Delivery
					</h1>
					<p class="hero-subtitle">
						Sed ut perspiciatis unde omnis iste natus sit voluptatem accusantium
						doloremque laudantium
					</p>
					<div class="hero-actions">
						<button class="btn-primary">Order Now</button>
						<button class="btn-secondary">
							<div class="play-icon-wrapper">
								<img
									src="images/7_51.svg"
									alt="Play Background"
									class="play-bg"
								/>
								<div class="play-triangle"></div>
							</div>
							Watch Video
						</button>
					</div>
					<div class="hero-reviews">
						<div class="stars">
							<img src="images/star.svg" alt="Star" />
							<img src="images/star.svg" alt="Star" />
							<img src="images/star.svg" alt="Star" />
							<img src="images/star.svg" alt="Star" />
							<img src="images/star.svg" alt="Star" />
						</div>
						<p class="review-text">5 star rating<br />based on 1788 reviews</p>
					</div>
				</div>
				<div class="hero-image-wrapper">
					<img
						src="images/75a13e4554eadf39c3f1708083b6f1b5cb191111.png"
						alt="Foo"
						class="hero-main-image"
					/>
				</div>
			</div>
		</section>
	</body>
</html>
